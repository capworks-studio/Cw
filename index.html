<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CapWorks</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

html,body{
width:100%;
height:100%;
}

body{
height:100vh;
overflow:hidden;
background:#050816;
display:flex;
justify-content:center;
align-items:center;
perspective:1200px;
position:relative;
}

/* ===== BACKGROUND ===== */
body::before{
content:"";
position:absolute;
top:50%;left:50%;
width:220vmax;
height:220vmax;
transform:translate(-50%,-50%);
background:
radial-gradient(circle at 20% 30%, #00ffff25, transparent 25%),
radial-gradient(circle at 80% 70%, #ff00ff20, transparent 25%),
radial-gradient(circle at 50% 50%, #0066ff25, transparent 35%);
animation:bgMove 18s linear infinite;
pointer-events:none;
z-index:0;
}

@keyframes bgMove{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* ===== LIGNES ===== */
.line{
position:absolute;
top:0;
width:2px;
height:260px;
background:linear-gradient(transparent,#00ffffaa,transparent);
filter:blur(1px);
opacity:.8;
animation:fall linear infinite;
pointer-events:none;
z-index:0;
}

@keyframes fall{
from{transform:translateY(-350px);opacity:0;}
20%{opacity:.9;}
to{transform:translateY(calc(100vh + 350px));opacity:0;}
}

/* ===== SCÈNE ===== */
.container{
position:relative;
z-index:10;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:18px;
transform-style:preserve-3d;
transition:transform .15s ease-out;
text-align:center;
padding:20px;
max-width:100%;
}

/* ===== LOGO ===== */
.logo{
font-size:7rem;
font-weight:900;
letter-spacing:10px;
display:flex;
gap:2px;
transform-style:preserve-3d;
flex-wrap:wrap;
justify-content:center;
line-height:1;
}

.logo span{
display:inline-block;
color:#0b0f1a;
text-shadow:
0 1px 0 #00e5ff,
0 2px 0 #4da3ff,
0 3px 0 #b56bff,
0 6px 10px rgba(0,229,255,0.55),
0 12px 25px rgba(181,107,255,0.35);
animation:glowSwap 3.5s ease-in-out infinite;
}

@keyframes glowSwap{
0%{
text-shadow:
0 1px 0 #00e5ff,
0 2px 0 #4da3ff,
0 3px 0 #b56bff,
0 6px 10px rgba(0,229,255,0.55),
0 12px 25px rgba(181,107,255,0.35);
}
50%{
text-shadow:
0 1px 0 #b56bff,
0 2px 0 #00e5ff,
0 3px 0 #4da3ff,
0 6px 12px rgba(181,107,255,0.55),
0 12px 28px rgba(0,229,255,0.35);
}
100%{
text-shadow:
0 1px 0 #00e5ff,
0 2px 0 #4da3ff,
0 3px 0 #b56bff,
0 6px 10px rgba(0,229,255,0.55),
0 12px 25px rgba(181,107,255,0.35);
}
}

/* ===== SUBTITLE ===== */
.subtitle{
color:#b6c5ff;
letter-spacing:6px;
font-size:1rem;
opacity:.9;
transform:translateZ(30px);
}

/* ===== BUTTON ===== */
.enter-btn{
display:inline-block;
padding:18px 44px;
color:white;
text-decoration:none;
font-size:1.15rem;
letter-spacing:1px;
border:2px solid #00ffff;
border-radius:999px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(12px);
box-shadow:0 0 18px rgba(0,255,255,0.5);
transition:.35s;
transform:translateZ(40px);
-webkit-tap-highlight-color:transparent;
}

.enter-btn:hover{
transform:translateZ(60px) translateY(-5px) scale(1.06);
}

/* ===== TILT HINT (mobile) ===== */
.tilt-hint{
font-size:.75rem;
letter-spacing:2px;
color:#7a8bbf;
opacity:.8;
transform:translateZ(20px);
display:none;
cursor:pointer;
border:1px solid rgba(0,255,255,.25);
border-radius:999px;
padding:8px 18px;
background:rgba(255,255,255,0.02);
}

/* ===== MAINTENANCE ===== */
.maintenance{
text-align:center;
color:#ffd166;
font-size:1rem;
line-height:1.6;
text-shadow:0 0 12px rgba(255,209,102,.9);
animation:pulse 2s ease-in-out infinite;
transform:translateZ(20px);
display:none;
}

@keyframes pulse{
0%,100%{opacity:.75;}
50%{opacity:1;}
}

/* ===== RESPONSIVE ===== */
@media (max-width:768px){

.logo{
font-size:3rem;
letter-spacing:4px;
gap:1px;
}

.subtitle{
font-size:.78rem;
letter-spacing:3px;
}

.enter-btn{
padding:14px 28px;
font-size:1rem;
}

}

@media (max-width:380px){
.logo{
font-size:2.4rem;
letter-spacing:3px;
}
}

/* ===== TOUCH OPTIMISATION ===== */
@media (hover:none){
.enter-btn:hover{
transform:translateZ(40px);
}
.container{
transform:none !important;
}
}

</style>
</head>

<body>

<div class="container" id="scene">

<div class="logo">
<span>C</span><span>A</span><span>P</span><span>W</span><span>O</span><span>R</span><span>K</span><span>S</span>
</div>

<div class="subtitle">
DÉVELOPPEMENT • CRÉATIVITÉ • PASSION
</div>

<a href="home.html" class="enter-btn" id="btn">
Entrer dans l'univers →
</a>

<div class="tilt-hint" id="tiltHint">✨ Touchez pour activer l'effet 3D</div>

<div class="maintenance" id="maintenance">
⚠️ Le site est actuellement indisponible.<br>
Ce site est en cours de rénovation afin de vous offrir une meilleure expérience.
</div>

</div>

<script>

const IS_MAINTENANCE = false;

const btn = document.getElementById("btn");
const maintenance = document.getElementById("maintenance");
const scene = document.getElementById("scene");
const tiltHint = document.getElementById("tiltHint");

if(IS_MAINTENANCE){
btn.removeAttribute("href");
btn.textContent = "Bientôt disponible";
maintenance.style.display = "block";
}

/* ===== LIGNES (moins nombreuses sur petit écran pour la perf) ===== */
const lineCount = window.innerWidth < 600 ? 14 : 25;
for(let i=lineCount;i--;){
const l=document.createElement("div");
l.className="line";
l.style.left=Math.random()*100+"vw";
l.style.animationDuration=(4+Math.random()*8)+"s";
l.style.animationDelay=(-Math.random()*10)+"s";
document.body.appendChild(l);
}

const isTouch = window.matchMedia("(hover:none)").matches;

/* ===== PC : tilt à la souris ===== */
if(!isTouch){
document.addEventListener("mousemove",(e)=>{
const x=(e.clientX/window.innerWidth - 0.5)*18;
const y=(e.clientY/window.innerHeight - 0.5)*18;
scene.style.transform=`rotateY(${x}deg) rotateX(${-y}deg)`;
});
}

/* ===== MOBILE : gyroscope, activé via tap (requis sur iOS 13+) ===== */
if(isTouch){
const needsPermission = typeof DeviceOrientationEvent !== "undefined"
  && typeof DeviceOrientationEvent.requestPermission === "function";

function startTilt(){
  let lastX=0,lastY=0;
  window.addEventListener("deviceorientation",(e)=>{
    if(e.beta==null || e.gamma==null)return;
    const x=Math.max(-10,Math.min(10,(e.gamma/45)*10));
    const y=Math.max(-10,Math.min(10,(e.beta/45)*10));
    lastX=lastX*0.85+x*0.15;
    lastY=lastY*0.85+y*0.15;
    scene.style.transform=`rotateY(${lastX}deg) rotateX(${lastY}deg)`;
  });
}

if(needsPermission){
  tiltHint.style.display="inline-block";
  tiltHint.addEventListener("click",async ()=>{
    try{
      const res=await DeviceOrientationEvent.requestPermission();
      if(res==="granted"){ startTilt(); tiltHint.style.display="none"; }
      else { tiltHint.textContent="Permission refusée"; }
    }catch(err){ tiltHint.style.display="none"; }
  },{once:false});
} else if("DeviceOrientationEvent" in window){
  // Android / navigateurs sans permission explicite
  startTilt();
}
}

</script>

</body>
</html>
