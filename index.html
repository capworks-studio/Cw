<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapWorks</title>

<style>
*{
margin:0;padding:0;box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#050816;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* ===== fond animé ORIGINAL ===== */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%, #00ffff22, transparent 20%),
radial-gradient(circle at 80% 70%, #ff00ff22, transparent 20%),
radial-gradient(circle at 50% 50%, #0066ff22, transparent 30%);
animation:bgMove 15s linear infinite;
}
@keyframes bgMove{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* ===== container ORIGINAL ===== */
.container{
position:relative;
z-index:10;
text-align:center;
padding:20px;
}

/* ===== LOGO ORIGINAL ===== */
.logo{
font-size:7rem;
font-weight:900;
letter-spacing:8px;
text-transform:uppercase;

background:linear-gradient(90deg,#00ffff,#00aaff,#ff00ff,#00ffff);
background-size:300% auto;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:shine 5s linear infinite,float 4s ease-in-out infinite;

cursor:pointer;
user-select:none;
}

@keyframes shine{
from{background-position:0% center;}
to{background-position:300% center;}
}

@keyframes float{
0%,100%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
}

/* ===== SUBTITLE ORIGINAL ===== */
.subtitle{
color:#b6c5ff;
letter-spacing:6px;
margin-top:15px;
margin-bottom:60px;
font-size:1rem;
cursor:pointer;
}

/* ===== BOUTON ORIGINAL ===== */
.enter-btn{
display:inline-block;
padding:18px 42px;
color:white;
text-decoration:none;
font-size:1.15rem;
letter-spacing:1px;

border:2px solid #00ffff;
border-radius:60px;

background:rgba(255,255,255,.03);
backdrop-filter:blur(10px);

box-shadow:0 0 15px #00ffff,0 0 35px #00ffff55;

transition:.35s;
cursor:pointer;
}

.enter-btn:hover{
transform:translateY(-4px) scale(1.05);
box-shadow:0 0 25px #00ffff,0 0 60px #00ffff,0 0 100px #00ffff;
}

/* ===== compteur ===== */
.counter{
position:fixed;
top:15px;
right:15px;
padding:8px 12px;
border:1px solid #00ffff;
border-radius:10px;
color:#00ffff;
font-size:14px;
display:none;
background:rgba(0,0,0,.4);
backdrop-filter:blur(6px);
z-index:9999;
animation:pop .25s ease;
}

@keyframes pop{
0%{transform:scale(.6);opacity:0}
100%{transform:scale(1);opacity:1}
}

/* ===== popup ===== */
.secret{
position:fixed;
top:50px;
left:50%;
transform:translateX(-50%);
color:#00ffff;
background:rgba(0,0,0,.5);
padding:10px 18px;
border:1px solid #00ffff;
border-radius:10px;
display:none;
z-index:9999;
animation:pop .25s ease;
}
</style>
</head>

<body>

<div class="container">

<h1 class="logo" id="logo">
<span>C</span><span>A</span><span>P</span><span>W</span><span>O</span><span>R</span><span>K</span><span>S</span>
</h1>

<div class="subtitle" id="subtitle">
DÉVELOPPEMENT • CRÉATIVITÉ • PASSION
</div>

<a class="enter-btn" id="btn">Entrer dans l'univers →</a>

</div>

<div class="counter" id="counter">0 / 15</div>
<div class="secret" id="secret"></div>

<script>

/* ================= BASE ================= */
const counter=document.getElementById("counter");
const secret=document.getElementById("secret");
const logo=document.getElementById("logo");
const subtitle=document.getElementById("subtitle");
const btn=document.getElementById("btn");

/* ================= STATE ================= */
const found=new Set();
const MAX=15;

function unlock(id,msg){
if(found.has(id)) return;

found.add(id);

counter.style.display="block";
counter.textContent=`${found.size} / ${MAX}`;
counter.style.animation="pop .25s ease";

secret.textContent=msg;
secret.style.display="block";
setTimeout(()=>secret.style.display="none",2000);

if(found.size===MAX){
secret.textContent="MODE SECRET DÉBLOQUÉ";
document.body.style.filter="hue-rotate(180deg)";
}
}

/* ================= 1 LOGO 3 CLICS ================= */
let lc=0;
logo.onclick=()=>{
lc++;
if(lc===3) unlock("logo","GLITCH DU LOGO");
setTimeout(()=>lc=0,800);
};

/* ================= 2 SUBTITLE 7 CLICS ================= */
let sc=0;
subtitle.onclick=()=>{
sc++;
if(sc===7) unlock("subtitle","MESSAGE CACHÉ");
};

/* ================= 3 CODE CAPWORKS ================= */
let code="";
logo.querySelectorAll("span").forEach(s=>{
s.onclick=()=>{
code+=s.textContent;
if("CAPWORKS".startsWith(code)){
if(code==="CAPWORKS") unlock("code","CODE CAPWORKS VALIDÉ");
}else code="";
}
});

/* ================= 4 KONAMI ================= */
let k=[];
const konami=["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];

window.onkeydown=e=>{
k.push(e.key);
k=k.slice(-10);
if(JSON.stringify(k)===JSON.stringify(konami))
unlock("konami","KONAMI ACTIVÉ");
};

/* ================= 5 HOLD BUTTON ================= */
let hold;
btn.onmousedown=()=>{
hold=setTimeout(()=>unlock("hold","BOUTON DÉVERROUILLÉ"),2000);
};
btn.onmouseup=()=>clearTimeout(hold);

/* ================= 6 KEY CAP ================= */
let keys="";
window.onkeydown=e=>{
keys+=e.key.toUpperCase();
if(keys.includes("CAP")) unlock("cap","CODE CAP DÉTECTÉ");
setTimeout(()=>keys="",1200);
};

/* ================= 7 IDLE ================= */
let idle;
function reset(){
clearTimeout(idle);
idle=setTimeout(()=>unlock("idle","MODE VEILLE"),10000);
}
window.onmousemove=reset;
reset();

</script>

</body>
</html>
